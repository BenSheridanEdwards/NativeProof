name: ci

# Build, lint and run the device-free test suite on every push and PR.
# (The on-device E2E lane needs a device/emulator and runs separately.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check
      - run: npm test
